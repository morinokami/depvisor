name: depvisor

on:
  # Keep the schedule disabled here; consumers enable it in their own workflow.
  # schedule:
  #   - cron: '0 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write # create PR labels (semver:*, security, ...)

concurrency:
  group: depvisor
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            registry.npmjs.org:443
            api.openai.com:443
            api.anthropic.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./
        with:
          llm_api_key: ${{ secrets.OPENAI_API_KEY }}
          llm_model: openai/gpt-5.5
          install_command: skip
          # The target here is depvisor itself; auto-detection would only find
          # lint/test, so name the full CI gate set explicitly.
          verify_commands: |
            pnpm run typecheck
            pnpm run lint
            pnpm run fmt:check
            pnpm run knip
            pnpm run test
