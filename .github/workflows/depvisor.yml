name: depvisor

on: # zizmor: ignore[dangerous-triggers] workflow_run is deliberate: depvisor starts after CI with default-branch secrets; see CLAUDE.md gotchas
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: {}

concurrency:
  group: depvisor-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    name: Review and fix dependency PR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read # read failed jobs and their logs
      contents: write # add one fix commit to the updater branch
      pull-requests: write # maintain the reviewer report comment
    steps:
      # The agent needs unrestricted research/install access in v2. Harden-runner
      # remains in audit mode here so the development workflow records egress
      # without preventing repository-specific package registries or docs.
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: ./
        id: depvisor
        with:
          llm_api_key: ${{ secrets.OPENAI_API_KEY }} # zizmor: ignore[secrets-outside-env] agent step has no GitHub token
          llm_model: openai/gpt-5.5

      # The weekly self-check parses this line back out of the job log
      # (OUTPUTS_LINE in src/core/self-check.ts); keep the field names and
      # order in sync with that regex. test/workflow-contract.test.ts pins it.
      - name: Show depvisor outputs
        if: always()
        env:
          STATUS: ${{ steps.depvisor.outputs.status }}
          FAILED: ${{ steps.depvisor.outputs.failed }}
          FIX_PUSHED: ${{ steps.depvisor.outputs.fix_pushed }}
          PR_URL: ${{ steps.depvisor.outputs.pr_url }}
          TOTAL_TOKENS: ${{ steps.depvisor.outputs.total_tokens }}
          EST_COST_USD: ${{ steps.depvisor.outputs.est_cost_usd }}
        run: echo "status=$STATUS failed=$FAILED fix_pushed=$FIX_PUSHED pr=$PR_URL total_tokens=$TOTAL_TOKENS est_cost_usd=$EST_COST_USD"
