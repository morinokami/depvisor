name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Code quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            registry.npmjs.org:443
            npm.flatt.tech:443
            nodejs.org:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: Restore `background: true` and `wait-all` once the zizmor version
      # shipped by zizmor-action can parse GitHub's parallel-step syntax.
      - name: Run oxlint
        run: pnpm run lint

      - name: Run format check
        run: pnpm run fmt:check

      - name: Run unit tests
        run: pnpm run test

      - name: Run type check
        run: pnpm run typecheck

      - name: Run knip
        run: pnpm run knip

  # E2E against real package managers: generate each fixture (green baseline on
  # main + an updater-style update/lru-cache branch whose bump breaks the
  # source), then run the deterministic aftercare core: commit classification,
  # the dependency diff, head verification (must be RED), and merge-base
  # baseline attribution (must be GREEN). Talks to the live npm registry
  # (fixture installs), so upstream hiccups fail one variant, not all
  # (fail-fast: false).
  fixture-e2e:
    name: Fixture E2E (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # `expect` names the packages the dependency diff must surface as
        # DIRECT changes — a lockfile-parser regression that shrinks the diff
        # fails the job instead of passing unnoticed.
        include:
          - name: npm
            init: "fixture:init"
            dest: fixtures/sample-app
            expect: "lru-cache"
          - name: pnpm
            init: "fixture:init:pnpm"
            dest: fixtures/sample-app-pnpm
            expect: "lru-cache"
          - name: bun
            init: "fixture:init:bun"
            dest: fixtures/sample-app-bun
            expect: "lru-cache"
            bun: true
          - name: npm-workspaces
            init: "fixture:init:workspaces"
            dest: fixtures/sample-app-workspaces
            expect: "lru-cache"
          - name: pnpm-workspaces
            init: "fixture:init:workspaces:pnpm"
            dest: fixtures/sample-app-pnpm-workspaces
            expect: "lru-cache"
          - name: bun-workspaces
            init: "fixture:init:workspaces:bun"
            dest: fixtures/sample-app-bun-workspaces
            expect: "lru-cache"
            bun: true
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            *.actions.githubusercontent.com:443
            registry.npmjs.org:443
            npm.flatt.tech:443
            nodejs.org:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "pnpm"

      # bun-version is pinned (docs/configuration.md's own advice to consumers):
      # depvisor parses `bun outdated`'s table output, so an unpinned bun would
      # turn upstream format drift into flakes instead of a deliberate
      # pin-bump-plus-parser-update.
      - name: Setup Bun
        if: ${{ matrix.bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize fixture
        env:
          INIT: ${{ matrix.init }}
        run: pnpm run "$INIT"

      - name: Run deterministic aftercare scan with attribution
        env:
          DEST: ${{ matrix.dest }}
          EXPECT: ${{ matrix.expect }}
        run: node src/dev/scan.ts "$DEST" --base=main --verify=broken --expect-changes="$EXPECT"

  zizmor:
    name: GitHub Actions security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            *.actions.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        # TODO: Consider automating updates to the actionlint version and checksum.
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="$RUNNER_TEMP/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --retry 3 --retry-all-errors --proto '=https' \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$ACTIONLINT_SHA256" "$archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          min-confidence: high
          persona: auditor
