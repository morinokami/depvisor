name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Code quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: Restore `background: true` and `wait-all` once the zizmor version
      # shipped by zizmor-action can parse GitHub's parallel-step syntax.
      - name: Run oxlint
        run: pnpm run lint

      - name: Run format check
        run: pnpm run fmt:check

      - name: Run unit tests
        run: pnpm run test

      - name: Run type check
        run: pnpm run typecheck

      - name: Run knip
        run: pnpm run knip

  # Deterministic-core E2E against real package managers: generate each fixture
  # variant, then run collect → group → verify (src/dev/scan.ts) on its green
  # baseline. No LLM, no API key, no bump — the agent path stays under
  # .github/workflows/depvisor.yml. Talks to the live npm registry (fixture
  # installs + `<pm> outdated`), so registry hiccups fail one variant, not all
  # (fail-fast: false).
  fixture-e2e:
    name: Fixture E2E (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # `expect` names the packages every scan must surface as ACTIONABLE
        # (grouped, not degraded to `unknown`), with `@<location>` pinning the
        # declaring workspace — so a partial parser regression (one dep-kind
        # section dropped, one workspace missing from enumeration, the shared
        # dep losing a location) fails the job instead of shrinking the output
        # unnoticed. Mirrors the fixture templates; update together.
        include:
          - name: npm
            init: "fixture:init"
            dest: fixtures/sample-app
            expect: "chalk,lru-cache,semver,@types/node,@types/semver,typescript"
          - name: pnpm
            init: "fixture:init:pnpm"
            dest: fixtures/sample-app-pnpm
            expect: "chalk,lru-cache,semver,@types/node,@types/semver,typescript"
          - name: bun
            init: "fixture:init:bun"
            dest: fixtures/sample-app-bun
            expect: "chalk,lru-cache,semver,@types/node,@types/semver,typescript"
            bun: true
          - name: npm-workspaces
            init: "fixture:init:workspaces"
            dest: fixtures/sample-app-workspaces
            expect: "lru-cache@packages/core,chalk@packages/web,semver@packages/core,semver@packages/web,@types/node@packages/core,typescript@packages/web"
          - name: pnpm-workspaces
            init: "fixture:init:workspaces:pnpm"
            dest: fixtures/sample-app-pnpm-workspaces
            expect: "lru-cache@packages/core,chalk@packages/web,semver@packages/core,semver@packages/web,@types/node@packages/core,typescript@packages/web"
          - name: bun-workspaces
            init: "fixture:init:workspaces:bun"
            dest: fixtures/sample-app-bun-workspaces
            expect: "lru-cache@packages/core,chalk@packages/web,semver@packages/core,semver@packages/web,@types/node@packages/core,typescript@packages/web"
            bun: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Takumi Guard
        uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ./.node-version
          cache: "pnpm"

      # bun-version is pinned (docs/configuration.md's own advice to consumers):
      # depvisor parses `bun outdated`'s table output, so an unpinned bun would
      # turn upstream format drift into flakes instead of a deliberate
      # pin-bump-plus-parser-update.
      - name: Setup Bun
        if: ${{ matrix.bun }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize fixture
        env:
          INIT: ${{ matrix.init }}
        run: pnpm run "$INIT"

      - name: Run deterministic scan with verification
        env:
          DEST: ${{ matrix.dest }}
          EXPECT: ${{ matrix.expect }}
        run: node src/dev/scan.ts "$DEST" --verify --expect-updates="$EXPECT"

  zizmor:
    name: GitHub Actions security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          min-confidence: high
          persona: auditor
