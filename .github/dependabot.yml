version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  # The npm cooldown pairs with pnpm-workspace.yaml's strict minimumReleaseAge.
  # @flue/* stays exact-pinned beta and is upgraded deliberately, not by bot.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@flue/*"
      # Types follow the pinned Node runtime major; bump together with
      # .node-version, engines, and action.yml's node_version default.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
