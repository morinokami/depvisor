name: depvisor
description: >-
  Reviews an existing Dependabot or Renovate PR, repairs CI breakage with an AI
  coding agent, verifies the repair, and posts an evidence-based report.
branding:
  icon: package
  color: purple

inputs:
  llm_api_key:
    description: LLM provider API key.
    required: false
    default: ""
  llm_model:
    description: Model specifier, for example openai/gpt-5.5.
    required: false
    default: ""
  llm_api_key_env:
    description: Environment variable name used for llm_api_key; inferred for known providers.
    required: false
    default: ""
  github_token:
    description: Token used only to read the triggering CI run and publish to the existing PR.
    required: false
    default: ${{ github.token }}
  node_version:
    description: Node version used to run depvisor itself.
    required: false
    default: "24"

outputs:
  status:
    description: >-
      reviewed, already-reviewed, repair-published, deferred, unsupported-pr,
      or a failing status.
    value: ${{ steps.report.outputs.status }}
  failed:
    description: '"true" when depvisor could not safely complete the review or publication.'
    value: ${{ steps.report.outputs.failed }}
  repaired:
    description: '"true" when depvisor published a repair commit to the updater PR.'
    value: ${{ steps.report.outputs.repaired }}
  pr_url:
    description: URL of the updater PR.
    value: ${{ steps.report.outputs.pr_url }}
  commit_sha:
    description: SHA of the repair commit, or empty when no repair was needed.
    value: ${{ steps.report.outputs.commit_sha }}
  comment_url:
    description: URL of depvisor's maintained reviewer-report comment.
    value: ${{ steps.report.outputs.comment_url }}
  total_tokens:
    description: Total model tokens used by the repair/review agent.
    value: ${{ steps.report.outputs.total_tokens }}
  est_cost_usd:
    description: Provider-priced estimated model cost in USD.
    value: ${{ steps.report.outputs.est_cost_usd }}

runs:
  using: composite
  steps:
    # Nested `uses:` steps cannot evaluate github.action_path. Resolve it once,
    # together with the run-scoped handoff directory used outside the target.
    - name: Resolve depvisor paths
      shell: bash
      env:
        RUN_DIR: ${{ runner.temp }}/depvisor-v2-${{ github.run_id }}-${{ github.run_attempt }}
      run: | # zizmor: ignore[github-env] trusted action path and runner temp only
        echo "DEPVISOR_HOME=$GITHUB_ACTION_PATH" >> "$GITHUB_ENV"
        echo "DEPVISOR_RUN_DIR=$RUN_DIR" >> "$GITHUB_ENV"
        echo "DEPVISOR_STATUS_FILE=$RUN_DIR/status.json" >> "$GITHUB_ENV"
        echo "DEPVISOR_CONTEXT_FILE=$RUN_DIR/context.json" >> "$GITHUB_ENV"
        echo "DEPVISOR_PAYLOAD_FILE=$RUN_DIR/repair.json" >> "$GITHUB_ENV"
        echo "DEPVISOR_PNPM_VERSION=$(node -p "require(process.env.GITHUB_ACTION_PATH + '/package.json').packageManager.split('@')[1]")" >> "$GITHUB_ENV"

    # package_json_file deliberately points at depvisor's own manifest. See the
    # release skill for the pnpm/action-setup absolute-path runner quirk.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: ${{ env.DEPVISOR_PNPM_VERSION }}
        package_json_file: ${{ env.DEPVISOR_HOME }}/package.json

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        package-manager-cache: false

    - name: Refuse persisted credentials in the target checkout
      shell: bash
      env:
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: node "$DEPVISOR_HOME/src/check-credentials.ts"

    - name: Install depvisor dependencies
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      run: pnpm install --frozen-lockfile

    # Read-only and before the agent: resolve the updater PR, snapshot its exact
    # dependency state, and collect failed-job logs. The resulting context has
    # no credentials and is treated as untrusted text by the agent.
    - name: Prepare updater PR context
      id: prepare
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
        DEPVISOR_REPOSITORY: ${{ github.repository }}
        DEPVISOR_API_URL: ${{ github.api_url }}
        DEPVISOR_SERVER_URL: ${{ github.server_url }}
        DEPVISOR_PR_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
        DEPVISOR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha || github.sha }}
        DEPVISOR_EVENT_NAME: ${{ github.event_name }}
        DEPVISOR_WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        DEPVISOR_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        DEPVISOR_WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        DEPVISOR_WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
      run: node "$DEPVISOR_HOME/src/prepare.ts"

    # local() is intentionally host-powerful. Snapshot every depvisor source
    # file before the model runs to detect direct publisher-source rewrites.
    # This is file-level hardening, not isolation from same-UID processes or
    # runner-writable executables; the residual risk is documented for users.
    # The hash script is deliberately inlined and repeated verbatim in the two
    # later token-holding steps: each must recompute it independently with the
    # pre-agent node binary instead of trusting any file the agent could edit.
    - name: Snapshot depvisor publisher
      id: integrity
      shell: bash
      env:
        BASH_ENV: ""
        ENV: ""
        NODE_OPTIONS: ""
        NODE_PATH: ""
      run: |
        node_bin="$(command -v node)"
        source_sha="$("$node_bin" -e '
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const root = path.resolve(process.argv[1]);
          const files = [];
          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const file = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(file);
              else if (entry.isFile()) files.push(file);
            }
          };
          walk(root);
          const hash = crypto.createHash("sha256");
          for (const file of files.sort()) {
            hash.update(path.relative(root, file));
            hash.update("\0");
            hash.update(fs.readFileSync(file));
          }
          process.stdout.write(hash.digest("hex"));
        ' "$DEPVISOR_HOME/src")"
        echo "node_bin=$node_bin" >> "$GITHUB_OUTPUT"
        echo "trusted_path=$PATH" >> "$GITHUB_OUTPUT"
        echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

    # local() gives the model the checkout, shell, installed runner tools, and
    # network. This step intentionally has the LLM key but no GitHub token.
    # Key/model validation is deliberately this late: unsupported PRs skip this
    # step and must complete cleanly without any LLM configuration.
    - name: Review and repair with depvisor
      id: agent
      if: steps.prepare.outputs.processable == 'true'
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        LLM_API_KEY_ENV: ${{ inputs.llm_api_key_env }}
        DEPVISOR_LLM_MODEL: ${{ inputs.llm_model }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: |
        if [ -z "$LLM_API_KEY" ]; then
          echo "::error::The llm_api_key input is required."
          exit 1
        fi
        if [ -z "$DEPVISOR_LLM_MODEL" ]; then
          echo "::error::The llm_model input is required (for example openai/gpt-5.5)."
          exit 1
        fi
        if [ -z "$LLM_API_KEY_ENV" ]; then
          case "$DEPVISOR_LLM_MODEL" in
            openai/*) LLM_API_KEY_ENV=OPENAI_API_KEY ;;
            anthropic/*) LLM_API_KEY_ENV=ANTHROPIC_API_KEY ;;
            openrouter/*) LLM_API_KEY_ENV=OPENROUTER_API_KEY ;;
            *)
              echo "::error::Set llm_api_key_env for model '$DEPVISOR_LLM_MODEL'."
              exit 1 ;;
          esac
        fi
        export "$LLM_API_KEY_ENV=$LLM_API_KEY"
        unset LLM_API_KEY
        pnpm --silent exec flue run repair --target node
        if [ -f "$DEPVISOR_PAYLOAD_FILE" ]; then
          echo "publishable=true" >> "$GITHUB_OUTPUT"
        fi

    # No new decisions here: recheck the frozen dependency state and PR head,
    # then publish the captured repair and agent-authored report to this one PR.
    - name: Publish repair and reviewer report
      if: steps.agent.outputs.publishable == 'true'
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        BASH_ENV: ""
        ENV: ""
        NODE_OPTIONS: ""
        NODE_PATH: ""
        LD_PRELOAD: ""
        DYLD_INSERT_LIBRARIES: ""
        PATH: ${{ steps.integrity.outputs.trusted_path }}
        GH_TOKEN: ${{ inputs.github_token }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
        DEPVISOR_REPOSITORY: ${{ github.repository }}
        DEPVISOR_API_URL: ${{ github.api_url }}
        DEPVISOR_SERVER_URL: ${{ github.server_url }}
        DEPVISOR_RUN_ID: ${{ github.run_id }}
        DEPVISOR_CONTEXT_SHA: ${{ steps.prepare.outputs.context_sha }}
        DEPVISOR_SNAPSHOT_SHA: ${{ steps.prepare.outputs.snapshot_sha }}
        EXPECTED_SOURCE_SHA: ${{ steps.integrity.outputs.source_sha }}
        NODE_BIN: ${{ steps.integrity.outputs.node_bin }}
      run: |
        actual_source_sha="$("$NODE_BIN" -e '
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const root = path.resolve(process.argv[1]);
          const files = [];
          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const file = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(file);
              else if (entry.isFile()) files.push(file);
            }
          };
          walk(root);
          const hash = crypto.createHash("sha256");
          for (const file of files.sort()) {
            hash.update(path.relative(root, file));
            hash.update("\0");
            hash.update(fs.readFileSync(file));
          }
          process.stdout.write(hash.digest("hex"));
        ' "$DEPVISOR_HOME/src")"
        if [ "$actual_source_sha" != "$EXPECTED_SOURCE_SHA" ]; then
          echo "::error::The agent changed depvisor's publisher source; refusing the token boundary."
          exit 1
        fi
        /usr/bin/env -i \
          HOME="$RUNNER_TEMP/depvisor-v2-publisher-home" \
          PATH="$PATH" \
          GH_TOKEN="$GH_TOKEN" \
          DEPVISOR_TARGET_REPO="$DEPVISOR_TARGET_REPO" \
          DEPVISOR_REPOSITORY="$DEPVISOR_REPOSITORY" \
          DEPVISOR_API_URL="$DEPVISOR_API_URL" \
          DEPVISOR_SERVER_URL="$DEPVISOR_SERVER_URL" \
          DEPVISOR_RUN_ID="$DEPVISOR_RUN_ID" \
          DEPVISOR_RUN_DIR="$DEPVISOR_RUN_DIR" \
          DEPVISOR_STATUS_FILE="$DEPVISOR_STATUS_FILE" \
          DEPVISOR_CONTEXT_FILE="$DEPVISOR_CONTEXT_FILE" \
          DEPVISOR_PAYLOAD_FILE="$DEPVISOR_PAYLOAD_FILE" \
          DEPVISOR_CONTEXT_SHA="$DEPVISOR_CONTEXT_SHA" \
          DEPVISOR_SNAPSHOT_SHA="$DEPVISOR_SNAPSHOT_SHA" \
          "$NODE_BIN" "$DEPVISOR_HOME/src/publish.ts"

    - name: Report depvisor result
      id: report
      if: always()
      shell: bash
      env:
        BASH_ENV: ""
        ENV: ""
        NODE_OPTIONS: ""
        NODE_PATH: ""
        LD_PRELOAD: ""
        DYLD_INSERT_LIBRARIES: ""
        PATH: ${{ steps.integrity.outputs.trusted_path }}
        EXPECTED_SOURCE_SHA: ${{ steps.integrity.outputs.source_sha }}
        NODE_BIN: ${{ steps.integrity.outputs.node_bin }}
        PR_URL: ${{ steps.prepare.outputs.pr_url }}
      run: |
        if [ -z "$NODE_BIN" ] || [ -z "$EXPECTED_SOURCE_SHA" ]; then
          echo "status=setup-failed" >> "$GITHUB_OUTPUT"
          echo "failed=true" >> "$GITHUB_OUTPUT"
          echo "repaired=false" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "commit_sha=" >> "$GITHUB_OUTPUT"
          echo "comment_url=" >> "$GITHUB_OUTPUT"
          echo "total_tokens=" >> "$GITHUB_OUTPUT"
          echo "est_cost_usd=" >> "$GITHUB_OUTPUT"
          echo "## depvisor" >> "$GITHUB_STEP_SUMMARY"
          echo "Setup failed before depvisor could create a run record." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
        actual_source_sha="$("$NODE_BIN" -e '
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const root = path.resolve(process.argv[1]);
          const files = [];
          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const file = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(file);
              else if (entry.isFile()) files.push(file);
            }
          };
          walk(root);
          const hash = crypto.createHash("sha256");
          for (const file of files.sort()) {
            hash.update(path.relative(root, file));
            hash.update("\0");
            hash.update(fs.readFileSync(file));
          }
          process.stdout.write(hash.digest("hex"));
        ' "$DEPVISOR_HOME/src")"
        if [ "$actual_source_sha" != "$EXPECTED_SOURCE_SHA" ]; then
          echo "status=publish-failed" >> "$GITHUB_OUTPUT"
          echo "failed=true" >> "$GITHUB_OUTPUT"
          echo "repaired=false" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "commit_sha=" >> "$GITHUB_OUTPUT"
          echo "comment_url=" >> "$GITHUB_OUTPUT"
          echo "total_tokens=" >> "$GITHUB_OUTPUT"
          echo "est_cost_usd=" >> "$GITHUB_OUTPUT"
          echo "## depvisor" >> "$GITHUB_STEP_SUMMARY"
          echo "Publisher source integrity failed after the agent step." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
        /usr/bin/env -i \
          HOME="$RUNNER_TEMP/depvisor-v2-reporter-home" \
          PATH="$PATH" \
          DEPVISOR_STATUS_FILE="$DEPVISOR_STATUS_FILE" \
          GITHUB_OUTPUT="$GITHUB_OUTPUT" \
          GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" \
          "$NODE_BIN" "$DEPVISOR_HOME/src/report-status.ts"
