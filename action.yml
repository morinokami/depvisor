name: depvisor
description: >-
  Aftercare for dependency-update PRs, analyze half: verifies an updater's PR
  (Dependabot, Renovate, …) against your build/test suite, repairs source
  breakage with a bounded AI fixer, proves the repair, and hands the result to
  the token-holding publish half (morinokami/depvisor/publish) as a workflow
  artifact. This job is deliberately token-free: it executes the target's own
  install/verify scripts, which can taint the runner, so the GitHub token
  lives in a separate job on a fresh runner.
branding:
  icon: package
  color: purple

inputs:
  llm_api_key:
    description: LLM provider API key. Exposed only to the token-free agent step.
    required: true
  llm_model:
    description: Model specifier for the provider, e.g. openai/gpt-5.5.
    required: true
  llm_api_key_env:
    description: Environment variable name used for llm_api_key; inferred for known providers.
    required: false
    default: ""
  artifact_name:
    description: Name of the workflow artifact carrying the publish payload to the publish job.
    required: false
    default: depvisor-aftercare
  pr_number:
    description: The updater PR's number. Defaults from the pull_request event context.
    required: false
    default: ${{ github.event.pull_request.number }}
  base_ref:
    description: The updater PR's base branch. Defaults from the pull_request event context.
    required: false
    default: ${{ github.event.pull_request.base.ref }}
  head_ref:
    description: The updater PR's head branch (must be checked out). Defaults from the pull_request event context.
    required: false
    default: ${{ github.event.pull_request.head.ref }}
  install_command:
    description: Dependency install command; use "auto" for npm/pnpm/bun lockfile installs or "skip" if already installed.
    required: false
    default: auto
  verify_commands:
    description: Newline-separated verification commands; replaces automatic build/lint/test script detection.
    required: false
    default: ""
  language:
    description: Restricted BCP-47-style language tag (e.g. "ja", "pt-BR") the agent writes the report's narrative text in. Only the LLM-written free text is localized; statuses, the repair commit message, and section headings stay English. Empty means English.
    required: false
    default: ""
  node_version:
    description: Node version used for depvisor and target verification scripts. Must be >= 24, depvisor's engines floor.
    required: false
    default: "24"

# Machine-shaped values only (fixed-vocabulary statuses, "true"/"false", and
# charset-gated URLs — never the agent's free text), so consumer workflows can
# branch on them without a workflow-command/shell-injection surface. A red run
# fails the job, so consuming steps need `if: always()`. Known runner bug:
# nesting this action inside another composite action loses step outputs
# (actions/runner#2009) — consume these from a workflow step directly.
outputs:
  status:
    description: >-
      Run status (report-prepared, repair-prepared, not-an-update-pr, deferred,
      publish-blocked, or a red status like baseline-red — see the status
      reference in docs/results.md). Empty when the run crashed before writing
      a status file.
    value: ${{ steps.report.outputs.status }}
  failed:
    description: >-
      "true" when this run fails the job, "false" otherwise — for
      `if: always()` consumers.
    value: ${{ steps.report.outputs.failed }}
  repaired:
    description: >-
      "true" when this run PREPARED a verified repair commit for the PR's head
      branch. Whether it landed is the publish job's `pushed` output — the
      updater can rebase between the two.
    value: ${{ steps.report.outputs.repaired }}
  total_tokens:
    description: >-
      Total LLM tokens used across the fixer and digest operations in the run.
      "0" when no usage was recorded or the run crashed before reporting.
    value: ${{ steps.report.outputs.total_tokens }}
  est_cost_usd:
    description: >-
      Estimated run cost in USD as a decimal string (provider-priced, not an
      invoice). "0.000000" when no agent ran; empty when the run did not report
      or any token-bearing model had no known price.
    value: ${{ steps.report.outputs.est_cost_usd }}

runs:
  using: composite
  steps:
    # Resolve two runner quirks in one place: nested `uses:` steps cannot read
    # `github.action_path`, and pnpm/action-setup mangles absolute
    # package_json_file paths by joining them to GITHUB_WORKSPACE.
    - name: Resolve action path and pnpm version
      shell: bash
      run: | # zizmor: ignore[github-env] trusted action path and manifest only
        echo "DEPVISOR_HOME=$GITHUB_ACTION_PATH" >> "$GITHUB_ENV"
        echo "DEPVISOR_PNPM_VERSION=$(node -p "require(process.env.GITHUB_ACTION_PATH + '/package.json').packageManager.split('@')[1]")" >> "$GITHUB_ENV"

    # We pin depvisor's own pnpm via `version`, but action-setup ALSO reads the
    # `packageManager` field from `package_json_file` (default `package.json`,
    # resolved against GITHUB_WORKSPACE = the target checkout) and refuses with
    # "Multiple versions of pnpm specified" when it differs from `version`. Point
    # `package_json_file` at depvisor's own manifest so the target repo's
    # `packageManager` is never read: the absolute path mangles (joined to
    # GITHUB_WORKSPACE) to a nonexistent file, action-setup swallows the ENOENT,
    # and `version` alone stands — and if the mangling is ever fixed it would
    # read depvisor's own pin, which equals `version`. Either way, no conflict.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: ${{ env.DEPVISOR_PNPM_VERSION }}
        package_json_file: ${{ env.DEPVISOR_HOME }}/package.json

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        # setup-node v5+ auto-caches based on the target repo's package.json;
        # keep the composite action's behavior independent of the target.
        package-manager-cache: false

    # Fail-closed credentials gate: the agent step and the target's install
    # scripts must never see a token, but actions/checkout defaults to
    # persist-credentials: true, which leaves it in the checkout's .git/config.
    # Refuse to run the rest of the pipeline next to it.
    - name: Refuse persisted credentials in the target checkout
      shell: bash
      env:
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: node "$DEPVISOR_HOME/src/check-credentials.ts"

    - name: Install depvisor dependencies
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      run: pnpm install --frozen-lockfile

    # Parse every behavior knob before target install/lifecycle scripts. The
    # workflow repeats the same core parser for defense in depth and status
    # ownership; this early pass exists so a typo fails in seconds, not after
    # waiting for target dependency installation.
    - name: Validate depvisor configuration
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        DEPVISOR_BASE_REF: ${{ inputs.base_ref }}
        DEPVISOR_HEAD_REF: ${{ inputs.head_ref }}
        DEPVISOR_PR_NUMBER: ${{ inputs.pr_number }}
        DEPVISOR_VERIFY_COMMANDS: ${{ inputs.verify_commands }}
        DEPVISOR_LANGUAGE: ${{ inputs.language }}
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
      run: node "$DEPVISOR_HOME/src/check-config.ts"

    # Keep the install command in an env var so shell metacharacters cannot
    # break out while GitHub generates the run script. `eval` then runs the
    # intended shell command; "auto" delegates to src/install-target.ts.
    - name: Install target dependencies
      if: inputs.install_command != 'skip'
      shell: bash
      env:
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: |
        if [ "$DEPVISOR_INSTALL_COMMAND" = "auto" ]; then
          node "$DEPVISOR_HOME/src/install-target.ts"
        else
          eval "$DEPVISOR_INSTALL_COMMAND"
        fi

    # Token-free aftercare step: the dependency diff, install, and all
    # verification are deterministic; the LLM is used only for the bounded
    # fixer/digest roles. Their built-in workspace is virtual; repo access is
    # through profile-owned jailed tools, so neither can reach this action
    # checkout or the later token-holding entrypoint. This step has the LLM
    # key; it never has a GitHub token.
    - name: Run depvisor (agent — no tokens)
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        LLM_API_KEY_ENV: ${{ inputs.llm_api_key_env }}
        DEPVISOR_LLM_MODEL: ${{ inputs.llm_model }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
        DEPVISOR_BASE_REF: ${{ inputs.base_ref }}
        DEPVISOR_HEAD_REF: ${{ inputs.head_ref }}
        DEPVISOR_PR_NUMBER: ${{ inputs.pr_number }}
        DEPVISOR_VERIFY_COMMANDS: ${{ inputs.verify_commands }}
        DEPVISOR_LANGUAGE: ${{ inputs.language }}
        # Forwarded for the baseline/head reinstalls: a custom command is
        # reused verbatim; "auto"/"skip" fall back to the PM's lockfile-faithful
        # install ("skip" skips only the pre-agent install step above, not the
        # attribution reinstalls, which need a committed lockfile).
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
      run: |
        if [ -z "$LLM_API_KEY" ]; then
          echo "::error::The llm_api_key input is required."
          exit 1
        fi
        if [ -z "$DEPVISOR_LLM_MODEL" ]; then
          echo "::error::The llm_model input is required (e.g. openai/gpt-5.5, anthropic/claude-sonnet-5)."
          exit 1
        fi
        # Hand the key to Flue under the env var its provider expects
        # (@flue/cli docs/guide/models.md).
        if [ -z "$LLM_API_KEY_ENV" ]; then
          case "$DEPVISOR_LLM_MODEL" in
            openai/*)     LLM_API_KEY_ENV=OPENAI_API_KEY ;;
            anthropic/*)  LLM_API_KEY_ENV=ANTHROPIC_API_KEY ;;
            openrouter/*) LLM_API_KEY_ENV=OPENROUTER_API_KEY ;;
            *)
              echo "::error::No default key env var for llm_model '$DEPVISOR_LLM_MODEL'; set the llm_api_key_env input."
              exit 1 ;;
          esac
        fi
        export "$LLM_API_KEY_ENV=$LLM_API_KEY"
        # Name the key's variable for the runtime, so target subprocesses
        # (install/verify) get it scrubbed even under a custom llm_api_key_env
        # (core/target-env.ts).
        export DEPVISOR_LLM_KEY_ENV="$LLM_API_KEY_ENV"
        unset LLM_API_KEY
        pnpm --silent exec flue run aftercare --target node

    # Tokenless: package the repair commit (when one exists) into a git bundle
    # next to the payload, so the artifact below can carry it to the publish
    # job. Commits travel as data because the two jobs never share a runner —
    # target scripts can taint this runner's files ($GITHUB_PATH, $GITHUB_ENV,
    # BASH_ENV), so nothing token-holding may execute here.
    - name: Bundle repair for publish
      if: always()
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: node "$DEPVISOR_HOME/src/bundle-payload.ts"

    # Hand the payload (report comment + optional repair bundle) to the publish
    # job. The artifact is untrusted input over there: the publish step
    # re-verifies the repair range structurally and re-sanitizes the comment.
    - name: Upload publish payload
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ env.DEPVISOR_HOME }}/pr-preview/
        if-no-files-found: ignore

    - name: Report depvisor result
      id: report
      if: always()
      shell: bash
      run: node "$DEPVISOR_HOME/src/report-status.ts"
