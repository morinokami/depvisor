name: depvisor
description: >-
  Updates your dependencies, fixes any breakage the update causes with an AI
  agent, verifies with your build/test suite, and opens an explained PR.
branding:
  icon: package
  color: purple

inputs:
  llm_api_key:
    description: LLM provider API key. Exposed only to a non-dry-run agent step; required unless dry_run is true.
    required: false
    default: ""
  llm_model:
    description: Model specifier for the provider, e.g. openai/gpt-5.5; required unless dry_run is true.
    required: false
    default: ""
  dry_run:
    description: When "true", show the deterministic candidate/group/PR plan without applying updates, calling an LLM, pushing, or opening PRs.
    required: false
    default: "false"
  conflict_refresh_only:
    description: When "true", refresh only explicitly conflicted existing depvisor PRs and never open a new PR. Defaults to "true" on push events and "false" otherwise, so a dependency-state push trigger repairs conflicts without replenishing the open-PR queue; set it explicitly to override.
    required: false
    default: ${{ github.event_name == 'push' }}
  install_command:
    description: Dependency install command; use "auto" for npm/pnpm/bun lockfile installs or "skip" if already installed.
    required: false
    default: auto
  llm_api_key_env:
    description: Environment variable name used for llm_api_key; inferred for known providers.
    required: false
    default: ""
  github_token:
    description: Token used only by the PR snapshot, push, and PR creation steps.
    required: false
    default: ${{ github.token }}
  base_branch:
    description: Base branch for update branches and PRs.
    required: false
    default: ${{ github.event.repository.default_branch }}
  verify_commands:
    description: Newline-separated verification commands; replaces automatic build/lint/test script detection.
    required: false
    default: ""
  open_pull_requests_limit:
    description: Maximum number of open depvisor PRs to keep at once; a run opens new PRs only up to this ceiling.
    required: false
    default: "5"
  minimum_release_age:
    description: Minimum number of days a version must have been public on the npm registry before depvisor updates to it; "0" disables the cooldown.
    required: false
    default: "1"
  minimum_release_age_exclude:
    description: Newline-separated package names exempted from the minimum_release_age check — for private-registry packages the public npm registry cannot vouch for. Exact names or trailing-"*" prefix globs like "@acme/*" (full-line "#" comments are allowed); version ranges, majors, and other pattern forms are not supported.
    required: false
    default: ""
  ignore:
    description: Newline-separated packages to never update; use "name" to skip a package entirely, "name@<major>" to skip only a specific major, or a trailing-"*" prefix glob like "@acme-forks/*" to skip every matching package (no major suffix on globs). Full-line "#" comments are allowed.
    required: false
    default: ""
  groups:
    description: 'Newline-separated package groups updated together in one PR, each line "<group-name>: <package> <package> ..." (members separated by spaces or commas). Exact package names or trailing-"*" prefix globs like "@acme/*"; each package may belong to at most one group; full-line "#" comments are allowed. Ungrouped packages keep getting their own PR.'
    required: false
    default: ""
  suggest_features:
    description: When "true", the agent also surfaces newly added capabilities from the release notes it already read that may be relevant to your code, as a display-only PR-body section (never adopted). Off by default; costs extra tokens and widens the agent's engagement with untrusted release notes.
    required: false
    default: "false"
  language:
    description: Restricted BCP-47-style language tag (e.g. "ja", "pt-BR") the agent writes the PR's narrative text in. Only the LLM-written free text is localized; statuses, commit messages, branch names, PR titles, and section headings stay English. Empty means English.
    required: false
    default: ""
  node_version:
    description: Node version used for depvisor and target verification scripts. Must be >= 24, depvisor's engines floor.
    required: false
    default: "24"

# Machine-shaped values only (fixed-vocabulary statuses, numbers, and
# charset-gated URLs — never the agent's free text), so consumer workflows can
# branch on them without a workflow-command/shell-injection surface. A red run
# fails the job, so consuming steps need `if: always()`. Known runner bug:
# nesting this action inside another composite action loses step outputs
# (actions/runner#2009) — consume these from a workflow step directly.
outputs:
  status:
    description: >-
      Run-level status (completed, dry-run-completed, no-updates, or a red status like
      baseline-red — see the status reference in docs/results.md). Empty when
      the run crashed before writing a status file.
    value: ${{ steps.report.outputs.status }}
  failed:
    description: >-
      "true" when this run fails the job (a completed run with a failed group
      included), "false" otherwise — for `if: always()` consumers.
    value: ${{ steps.report.outputs.failed }}
  prepared_count:
    description: >-
      Number of dependency groups whose PR this run prepared (newly opened and
      refreshed alike).
    value: ${{ steps.report.outputs.prepared_count }}
  pr_urls:
    description: >-
      Newline-separated URLs of the PRs this run opened or refreshed.
    value: ${{ steps.report.outputs.pr_urls }}
  total_tokens:
    description: >-
      Total LLM tokens used across every fixer and digest operation in the run.
      "0" when no usage was recorded or the run crashed before reporting.
    value: ${{ steps.report.outputs.total_tokens }}
  est_cost_usd:
    description: >-
      Estimated run cost in USD as a decimal string (provider-priced, not an
      invoice). "0.000000" when no agent ran; empty when the run did not report
      or any token-bearing model had no known price.
    value: ${{ steps.report.outputs.est_cost_usd }}

runs:
  using: composite
  steps:
    # Resolve two runner quirks in one place: nested `uses:` steps cannot read
    # `github.action_path`, and pnpm/action-setup mangles absolute
    # package_json_file paths by joining them to GITHUB_WORKSPACE.
    - name: Resolve action path and pnpm version
      shell: bash
      run: | # zizmor: ignore[github-env] trusted action path and manifest only
        echo "DEPVISOR_HOME=$GITHUB_ACTION_PATH" >> "$GITHUB_ENV"
        echo "DEPVISOR_PNPM_VERSION=$(node -p "require(process.env.GITHUB_ACTION_PATH + '/package.json').packageManager.split('@')[1]")" >> "$GITHUB_ENV"

    # We pin depvisor's own pnpm via `version`, but action-setup ALSO reads the
    # `packageManager` field from `package_json_file` (default `package.json`,
    # resolved against GITHUB_WORKSPACE = the target checkout) and refuses with
    # "Multiple versions of pnpm specified" when it differs from `version`. Point
    # `package_json_file` at depvisor's own manifest so the target repo's
    # `packageManager` is never read: the absolute path mangles (joined to
    # GITHUB_WORKSPACE) to a nonexistent file, action-setup swallows the ENOENT,
    # and `version` alone stands — and if the mangling is ever fixed it would
    # read depvisor's own pin, which equals `version`. Either way, no conflict.
    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        version: ${{ env.DEPVISOR_PNPM_VERSION }}
        package_json_file: ${{ env.DEPVISOR_HOME }}/package.json

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}
        # setup-node v5+ auto-caches based on the target repo's package.json;
        # keep the composite action's behavior independent of the target.
        package-manager-cache: false

    # Fail-closed credentials gate: the agent step and the target's install
    # scripts must never see a token, but actions/checkout defaults to
    # persist-credentials: true, which leaves it in the checkout's .git/config.
    # Refuse to run the rest of the pipeline next to it.
    - name: Refuse persisted credentials in the target checkout
      shell: bash
      env:
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: node "$DEPVISOR_HOME/src/check-credentials.ts"

    - name: Install depvisor dependencies
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      run: pnpm install --frozen-lockfile

    # Parse every behavior knob before target install/lifecycle scripts. The
    # workflow repeats the same core parser for defense in depth and status
    # ownership; this early pass exists so a typo fails in seconds, not after
    # waiting for target dependency installation.
    - name: Validate depvisor configuration
      id: config
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        DEPVISOR_DRY_RUN: ${{ inputs.dry_run }}
        DEPVISOR_CONFLICT_REFRESH_ONLY: ${{ inputs.conflict_refresh_only }}
        DEPVISOR_BASE_BRANCH: ${{ inputs.base_branch }}
        DEPVISOR_VERIFY_COMMANDS: ${{ inputs.verify_commands }}
        DEPVISOR_OPEN_PULL_REQUESTS_LIMIT: ${{ inputs.open_pull_requests_limit }}
        DEPVISOR_MINIMUM_RELEASE_AGE: ${{ inputs.minimum_release_age }}
        DEPVISOR_MINIMUM_RELEASE_AGE_EXCLUDE: ${{ inputs.minimum_release_age_exclude }}
        DEPVISOR_IGNORE: ${{ inputs.ignore }}
        DEPVISOR_GROUPS: ${{ inputs.groups }}
        DEPVISOR_SUGGEST_FEATURES: ${{ inputs.suggest_features }}
        DEPVISOR_LANGUAGE: ${{ inputs.language }}
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
      run: node "$DEPVISOR_HOME/src/check-config.ts"

    # Deterministic, token-holding, and intentionally before target install:
    # lifecycle scripts can taint runner files and inherited config for later
    # steps. The entrypoint uses a trusted repository identifier, scrubbed gh
    # environment, and bounded REST polling so lazily-computed mergeability can
    # still repair a conflicted PR in this run. The initial list is fail-closed;
    # individual poll failures remain UNKNOWN and fail soft.
    - name: Snapshot open PRs
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        DEPVISOR_REPOSITORY: ${{ github.repository }}
        DEPVISOR_API_URL: ${{ github.api_url }}
        DEPVISOR_OPEN_PRS_FILE: ${{ runner.temp }}/depvisor-open-prs.json
      run: node "$DEPVISOR_HOME/src/snapshot-open-prs.ts"

    # Keep the install command in an env var so shell metacharacters cannot
    # break out while GitHub generates the run script. `eval` then runs the
    # intended shell command; "auto" delegates to src/install-target.ts.
    - name: Install target dependencies
      if: inputs.install_command != 'skip'
      shell: bash
      env:
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
      run: |
        if [ "$DEPVISOR_INSTALL_COMMAND" = "auto" ]; then
          node "$DEPVISOR_HOME/src/install-target.ts"
        else
          eval "$DEPVISOR_INSTALL_COMMAND"
        fi

    # Token-free update step: a normal run performs the deterministic
    # bump/install/verification and uses the LLM only for the bounded
    # fixer/digest roles; dry-run stops before all of those operations. Their
    # built-in workspace is virtual; repo access is through profile-owned jailed
    # tools, so neither can reach this action checkout or the later token-holding
    # entrypoint. A normal run has the LLM key; dry-run has no LLM credentials;
    # neither path has a GitHub token.
    - name: Run depvisor (agent — no tokens)
      shell: bash
      working-directory: ${{ env.DEPVISOR_HOME }}
      env:
        # Never place LLM credentials/model selection in the dry-run process.
        LLM_API_KEY: ${{ steps.config.outputs.dry_run != 'true' && inputs.llm_api_key || '' }}
        LLM_API_KEY_ENV: ${{ steps.config.outputs.dry_run != 'true' && inputs.llm_api_key_env || '' }}
        DEPVISOR_LLM_MODEL: ${{ steps.config.outputs.dry_run != 'true' && inputs.llm_model || '' }}
        DEPVISOR_DRY_RUN: ${{ steps.config.outputs.dry_run }}
        DEPVISOR_CONFLICT_REFRESH_ONLY: ${{ inputs.conflict_refresh_only }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
        DEPVISOR_BASE_BRANCH: ${{ inputs.base_branch }}
        DEPVISOR_VERIFY_COMMANDS: ${{ inputs.verify_commands }}
        DEPVISOR_OPEN_PULL_REQUESTS_LIMIT: ${{ inputs.open_pull_requests_limit }}
        DEPVISOR_MINIMUM_RELEASE_AGE: ${{ inputs.minimum_release_age }}
        DEPVISOR_MINIMUM_RELEASE_AGE_EXCLUDE: ${{ inputs.minimum_release_age_exclude }}
        DEPVISOR_IGNORE: ${{ inputs.ignore }}
        DEPVISOR_GROUPS: ${{ inputs.groups }}
        DEPVISOR_SUGGEST_FEATURES: ${{ inputs.suggest_features }}
        DEPVISOR_LANGUAGE: ${{ inputs.language }}
        # Forwarded for the reset between dependency groups: a custom command is
        # reused verbatim; "auto"/"skip" fall back to the PM's lockfile-faithful
        # install ("skip" skips only the pre-agent install step above, not the
        # between-groups reinstall, which needs a committed lockfile).
        DEPVISOR_INSTALL_COMMAND: ${{ inputs.install_command }}
        DEPVISOR_OPEN_PRS_FILE: ${{ runner.temp }}/depvisor-open-prs.json
      run: |
        if [ "$DEPVISOR_DRY_RUN" != "true" ]; then
          # Composite actions cannot express conditionally-required inputs, so
          # enforce both credentials here for normal runs.
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::The llm_api_key input is required unless dry_run is true."
            exit 1
          fi
          if [ -z "$DEPVISOR_LLM_MODEL" ]; then
            echo "::error::The llm_model input is required (e.g. openai/gpt-5.5, anthropic/claude-sonnet-5) unless dry_run is true."
            exit 1
          fi
          # Hand the key to Flue under the env var its provider expects
          # (@flue/cli docs/guide/models.md).
          if [ -z "$LLM_API_KEY_ENV" ]; then
            case "$DEPVISOR_LLM_MODEL" in
              openai/*)     LLM_API_KEY_ENV=OPENAI_API_KEY ;;
              anthropic/*)  LLM_API_KEY_ENV=ANTHROPIC_API_KEY ;;
              openrouter/*) LLM_API_KEY_ENV=OPENROUTER_API_KEY ;;
              *)
                echo "::error::No default key env var for llm_model '$DEPVISOR_LLM_MODEL'; set the llm_api_key_env input."
                exit 1 ;;
            esac
          fi
          export "$LLM_API_KEY_ENV=$LLM_API_KEY"
        fi
        unset LLM_API_KEY
        pnpm --silent exec flue run update --target node

    # Deterministic, token-holding: push the branch and open (or refresh) the
    # PR from the emitted payload. Refuses to force-push over human commits.
    - name: Push branch & open PR
      if: steps.config.outputs.dry_run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        DEPVISOR_TARGET_REPO: ${{ github.workspace }}
        # Trusted push target from the Actions context. Do not derive it from
        # the target checkout's .git/config; target lifecycle/verification
        # commands can rewrite that to a local bare repo whose server-side hooks
        # would run here with GH_TOKEN.
        DEPVISOR_REMOTE_URL: ${{ github.server_url }}/${{ github.repository }}
        # The closed-world mode is re-enforced at this boundary (a snapshot-time
        # selection cannot see a PR merged/closed mid-run); it must come from
        # this trusted input, never from the agent-adjacent payload files.
        DEPVISOR_CONFLICT_REFRESH_ONLY: ${{ inputs.conflict_refresh_only }}
      run: node "$DEPVISOR_HOME/src/open-pr.ts"

    - name: Report depvisor result
      id: report
      if: always()
      shell: bash
      run: node "$DEPVISOR_HOME/src/report-status.ts"
